<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Milli - RetoRuleta</title>
    <link rel="stylesheet" href="css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="container header__inner">
        <div class="logo">
            <span class="logo-icon">🎡</span>
            <span class="logo-text">RetoRuleta</span>
        </div>
        <nav class="nav">
            <a href="index.html" class="nav-link">Inicio</a>
            <a href="comunidad.html" class="nav-link">Community</a>
            <a href="ruleta.html" class="nav-link">Challenges</a>
            <a href="about.html" class="nav-link active">About Milli</a>
        </nav>
    </div>
</header>

<!-- HERO -->
<section class="hero">
    <div class="hero__media">
        <div class="hero__image-placeholder"></div>
    </div>
</section>

<!-- PAGE TITLE -->
<section class="page-title-section">
    <div class="container">
        <h1 class="page-title">ABOUT MILLI</h1>
    </div>
</section>

<!-- IMAGEN GRANDE -->
<section class="about-main-image">
    <div class="container">
        <div class="about__image-large-placeholder"></div>
    </div>
</section>

<!-- BENTO / BLOQUES DE TEXTO -->
<section class="about-bento">
    <div class="container">
        <div class="bento-grid">
            <div class="bento-block bento-block--wide">
                <div class="bento__placeholder"></div>
            </div>
            <div class="bento-block bento-block--medium">
                <div class="bento__placeholder"></div>
            </div>
            <div class="bento-block bento-block--small">
                <div class="bento__placeholder"></div>
            </div>
            <div class="bento-block bento-block--small">
                <div class="bento__placeholder"></div>
            </div>
            <div class="bento-block bento-block--medium">
                <div class="bento__placeholder"></div>
            </div>
        </div>
    </div>
</section>

<!-- CAJA / FORMULARIO -->
<section class="about-contact">
    <div class="container">
        <div class="about-contact__box">
            <h3>¿Quieres saber más?</h3>
            <p>Contáctanos o únete a la comunidad.</p>
            <a href="comunidad.html" class="btn btn-primary">Ir a la Comunidad</a>
        </div>
    </div>
</section>

<!-- FOOTER -->
<footer class="footer">
    <div class="container footer__inner">
        <p>&copy; 2024 RetoRuleta</p>
        <div class="footer-links">
            <a href="#">Aviso Legal</a>
            <a href="#">Privacidad</a>
            <a href="#">Cookies</a>
        </div>
    </div>
</footer>

<div id="cookieBanner" class="cookie-banner">
    <div class="cookie-content">
        <p>Utilizamos cookies para mejorar tu experiencia.</p>
        <div class="cookie-buttons">
            <button id="acceptCookies" class="btn btn-primary">Aceptar</button>
            <button id="rejectCookies" class="btn btn-secondary">Rechazar</button>
        </div>
    </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
