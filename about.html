<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Milli - RetoRuleta</title>
    <link rel="stylesheet" href="css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<section class="hero hero--about">
    <header class="header">
        <div class="container">
            <div class="header__logo">
                <a href="index.html" class="logo">
                    <span class="logo-icon">🎡</span>
                    <span class="logo-text">RetoRuleta</span>
                </a>
            </div>
            <nav class="nav">
                <a href="comunidad.html" class="nav-link">Community</a>
                <a href="ruleta.html" class="nav-link">Challenges</a>
                <a href="about.html" class="nav-link active">About Milli</a>
                <a href="#" class="nav-link">Social Media</a>
            </nav>
        </div>
    </header>
    <div class="hero__title">
        <h1 class="page-title">ABOUT MILLI</h1>
    </div>
    <a class="hero__scroll-indicator" href="#main-content">
        <span>↓</span>
    </a>
</section>


<!-- IMAGEN GRANDE -->
<section id="main-content" class="about-main-image">
    <div class="about__image-large-placeholder"></div>
</section>

<!-- BENTO GRID -->
<section class="about-bento">
    <div class="bento-grid">
        <!-- Fila 1: bloque ancho -->
        <div class="bento-block bento-block--full">
            <div class="bento__placeholder"></div>
        </div>
        <!-- Fila 2: grande izquierda + pequeño derecha -->
        <div class="bento-block bento-block--large">
            <div class="bento__placeholder"></div>
        </div>
        <div class="bento-block bento-block--small">
            <div class="bento__placeholder"></div>
        </div>
        <!-- Fila 3: pequeño izquierda + grande derecha -->
        <div class="bento-block bento-block--small">
            <div class="bento__placeholder"></div>
        </div>
        <div class="bento-block bento-block--large">
            <div class="bento__placeholder"></div>
        </div>
    </div>
</section>

<!-- SECCIÓN INFERIOR -->
<section class="about-contact">
    <div class="container">
        <div class="about-contact__box">
            <h3>¿Quieres saber más?</h3>
            <p>Contáctanos o únete a la comunidad.</p>
            <a href="comunidad.html" class="btn btn-primary">Ir a la Comunidad</a>
        </div>
    </div>
</section>

<!-- FOOTER -->
<footer class="footer">
    <div class="container footer__inner">
        <p>&copy; 2024 RetoRuleta</p>
        <div class="footer-links">
            <a href="#">Aviso Legal</a>
            <a href="#">Privacidad</a>
            <a href="#">Cookies</a>
        </div>
    </div>
</footer>

<div id="cookieBanner" class="cookie-banner">
    <div class="cookie-content">
        <p>Utilizamos cookies para mejorar tu experiencia.</p>
        <div class="cookie-buttons">
            <button id="acceptCookies" class="btn btn-primary">Aceptar</button>
            <button id="rejectCookies" class="btn btn-secondary">Rechazar</button>
        </div>
    </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
