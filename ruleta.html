<script>
    var RULETAS = [
        { retos: ['10 sentadillas','Plancha 30s','20 saltos','Puntillas 1min','Baila 2min','15 flexiones','Corre en sitio','Equilibrio 30s'] },
        { retos: ['Llama a un amigo','Manda un meme','Pregunta incómoda','Di un cumplido','Imita a alguien','Cuenta un chiste','Foto con extraño','Karaoke improv'] },
        { retos: ['Dibuja en 60s','Inventa canción','Foto artística','Escribe un poema','Diseña personaje','Actúa una escena','Crea un baile','Pinta con dedos'] },
        { retos: ['Come algo picante','Mezcla rara','Come sin manos','Adivina ingrediente','Inventa receta','Come en 30s','Prueba algo nuevo','Batido misterioso'] },
        { retos: ['Sin móvil 1h','Aprende truco','Graba un vídeo','Busca algo viral','Aprende shortcut','Diseña un meme','Cambia foto perfil','Alarma rara'] }
    ];
    var COLORS = ['#df9a31','#cd5796','#704b93','#98bc39','#61aea4','#ede53b','#df9a31','#61aea4'];
    var angles = [0,0,0,0,0];
    var spinning = [false,false,false,false,false];

    function drawWheel(idx) {
        var canvas = document.getElementById('ruleta-' + idx);
        if (!canvas) return;
        var ctx = canvas.getContext('2d');
        var cx = canvas.width / 2;
        var cy = canvas.height / 2;
        var r = cx - 10;
        var retos = RULETAS[idx].retos;
        var n = retos.length;
        var arc = (2 * Math.PI) / n;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(angles[idx]);

        for (var i = 0; i < n; i++) {
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.arc(0, 0, r, i * arc, (i+1) * arc);
            ctx.closePath();
            ctx.fillStyle = COLORS[i % COLORS.length];
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 3;
            ctx.stroke();

            ctx.save();
            ctx.rotate(i * arc + arc / 2);
            ctx.textAlign = 'right';
            ctx.fillStyle = 'white';
            ctx.font = 'bold ' + Math.round(r * 0.12) + 'px sans-serif';
            var words = retos[i].split(' ');
            var lineH = r * 0.15;
            var offset = -(words.length - 1) * lineH / 2;
            for (var w = 0; w < words.length; w++) {
                ctx.fillText(words[w], r - 12, offset + w * lineH + 4);
            }
            ctx.restore();
        }

        // Centro blanco
        ctx.beginPath();
        ctx.arc(0, 0, r * 0.08, 0, 2 * Math.PI);
        ctx.fillStyle = 'white';
        ctx.fill();
        ctx.restore();

        // Puntero
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.moveTo(cx, 2);
        ctx.lineTo(cx - 12, 22);
        ctx.lineTo(cx + 12, 22);
        ctx.closePath();
        ctx.fill();
    }

    function spinWheel(idx) {
        if (spinning[idx]) return;
        spinning[idx] = true;
        document.getElementById('result-' + idx).textContent = '';
        var duration = 3000 + Math.random() * 2000;
        var extra = Math.PI * 2 * (6 + Math.random() * 6);
        var start = angles[idx];
        var end = start + extra;
        var t0 = performance.now();

        function step(now) {
            var p = Math.min((now - t0) / duration, 1);
            var e = 1 - Math.pow(1 - p, 3);
            angles[idx] = start + (end - start) * e;
            drawWheel(idx);
            if (p < 1) {
                requestAnimationFrame(step);
            } else {
                spinning[idx] = false;
                var n = RULETAS[idx].retos.length;
                var arc = (2 * Math.PI) / n;
                var norm = ((angles[idx] % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
                var winner = Math.floor(((Math.PI*2 - norm) % (Math.PI*2)) / arc) % n;
                document.getElementById('result-' + idx).textContent = '🎯 ' + RULETAS[idx].retos[winner];
            }
        }
        requestAnimationFrame(step);
    }

    // Dibujar al cargar
    window.onload = function() {
        for (var i = 0; i < 5; i++) drawWheel(i);
    };
</script>
