<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenges - RetoRuleta</title>
    <link rel="stylesheet" href="css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="container header__inner">
        <div class="logo">
            <span class="logo-icon">🎡</span>
            <span class="logo-text">RetoRuleta</span>
        </div>
        <nav class="nav">
            <a href="index.html" class="nav-link">Inicio</a>
            <a href="comunidad.html" class="nav-link">Community</a>
            <a href="ruleta.html" class="nav-link active">Challenges</a>
            <a href="about.html" class="nav-link">About Milli</a>
        </nav>
    </div>
</header>

<!-- HERO -->
<section class="hero">
    <div class="hero__media">
        <div class="hero__image-placeholder"></div>
    </div>
</section>

<!-- PAGE TITLE -->
<section class="page-title-section">
    <div class="container">
        <h1 class="page-title">CHALLENGES</h1>
    </div>
</section>

<!-- CHALLENGES MASONRY -->
<section class="section-challenges-page">
    <div class="container">
        <div class="challenges-masonry">
            <!-- Fila superior: 2 círculos -->
            <div class="challenges-masonry__row challenges-masonry__row--top">
                <div class="challenge-circle-item">
                    <button class="challenge-circle-btn" onclick="girarRuleta()">
                        <div class="circle__image-placeholder"></div>
                    </button>
                    <span class="circle__label">—</span>
                </div>
                <div class="challenge-circle-item">
                    <button class="challenge-circle-btn" onclick="girarRuleta()">
                        <div class="circle__image-placeholder"></div>
                    </button>
                    <span class="circle__label">—</span>
                </div>
            </div>
            <!-- Centro: 1 círculo grande -->
            <div class="challenges-masonry__row challenges-masonry__row--center">
                <div class="challenge-circle-item">
                    <button class="challenge-circle-btn challenge-circle-btn--large" id="spinBtn" onclick="girarRuleta()">
                        <div class="circle__image-placeholder"></div>
                    </button>
                    <span class="circle__label">—</span>
                </div>
            </div>
            <!-- Fila inferior: 2 círculos -->
            <div class="challenges-masonry__row challenges-masonry__row--bottom">
                <div class="challenge-circle-item">
                    <button class="challenge-circle-btn" onclick="girarRuleta()">
                        <div class="circle__image-placeholder"></div>
                    </button>
                    <span class="circle__label">—</span>
                </div>
                <div class="challenge-circle-item">
                    <button class="challenge-circle-btn" onclick="girarRuleta()">
                        <div class="circle__image-placeholder"></div>
                    </button>
                    <span class="circle__label">—</span>
                </div>
            </div>
        </div>

        <!-- Resultado del reto -->
        <div id="resultadoReto" class="resultado-reto">
            <p>Pulsa un reto para girar la ruleta</p>
        </div>
    </div>
</section>

<!-- HISTORIAL / IMAGEN -->
<section class="section-challenges-extra">
    <div class="container">
        <div class="challenges-extra__media">
            <div class="challenges-extra__image-placeholder"></div>
        </div>
    </div>
</section>

<!-- FOOTER -->
<footer class="footer">
    <div class="container footer__inner">
        <p>&copy; 2024 RetoRuleta</p>
        <div class="footer-links">
            <a href="#">Aviso Legal</a>
            <a href="#">Privacidad</a>
            <a href="#">Cookies</a>
        </div>
    </div>
</footer>

<div id="cookieBanner" class="cookie-banner">
    <div class="cookie-content">
        <p>Utilizamos cookies para mejorar tu experiencia.</p>
        <div class="cookie-buttons">
            <button id="acceptCookies" class="btn btn-primary">Aceptar</button>
            <button id="rejectCookies" class="btn btn-secondary">Rechazar</button>
        </div>
    </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
